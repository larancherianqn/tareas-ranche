# Blueprint de Render. Al conectar el repo con "Blueprint", Render lee este archivo
# y crea la base de datos + el servicio web. Las variables marcadas "sync: false"
# las completás a mano en el panel (son secretas).

databases:
  - name: tareas-db
    databaseName: tareas
    user: tareas
    plan: free

services:
  - type: web
    name: tareas-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tareas-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: APP_TIMEZONE
        value: America/Argentina/Buenos_Aires
